<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reproductor Musical Estilo Spotify</title>
  <link rel="stylesheet" href="/reproductor.css">
</head>
<body>
  <div class="player-container">
    <!-- Información de la canción actual -->
    <div class="song-info">
      <div id="currentSongTitle">Sin canción</div>
      <div id="currentArtistName">Artista</div>
    </div>

    <!-- Elemento de audio -->
    <audio id="audioPlayer" preload="metadata">
      Tu navegador no soporta la etiqueta de audio.
    </audio>


    <div class="buttons-container">
      <!-- Botones de control -->
      <div class="controls">
        <button class="control-button" id="prevBtn"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" width="24" height="24" stroke-width="3">
          <path d="M7 6v12"></path>
          <path d="M18 6l-6 6l6 6"></path>
        </svg></button>
        <button class="control-button play-pause" id="playBtn"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" width="24" height="24" stroke-width="2"> <path d="M6 5m0 1a1 1 0 0 1 1 -1h2a1 1 0 0 1 1 1v12a1 1 0 0 1 -1 1h-2a1 1 0 0 1 -1 -1z"></path> <path d="M14 5m0 1a1 1 0 0 1 1 -1h2a1 1 0 0 1 1 1v12a1 1 0 0 1 -1 1h-2a1 1 0 0 1 -1 -1z"></path> </svg> </button>
        <button class="control-button" id="nextBtn"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" width="24" height="24" stroke-width="3"> <path d="M6 6l6 6l-6 6"></path> <path d="M17 5v13"></path> </svg> </button>
      </div>
    
      <!-- Control de volumen -->
      <div class="volume-container">
        <span>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" width="24" height="24" stroke-width="2">
            <path d="M15 8a5 5 0 0 1 0 8"></path>
            <path d="M6 15h-2a1 1 0 0 1 -1 -1v-4a1 1 0 0 1 1 -1h2l3.5 -4.5a.8 .8 0 0 1 1.5 .5v14a.8 .8 0 0 1 -1.5 .5l-3.5 -4.5"></path>
          </svg>
        </span>
        <input 
          type="range" 
          class="volume-slider" 
          min="0" max="1" step="0.1" value="1"
        />
      </div>      
    </div>
    

    <div class="progress-container">
      <span id="currentTime">0:00</span>
      <div class="progress-bar">
          <div class="progress"></div>
      </div>
      <span id="duration">0:00</span>
    </div>


  
    <!-- Playlist dinámica (las últimas 3 canciones) -->
    <div class="playlist" id="playlistContainer"></div>
  </div>

  <script>
    let canciones = [];           // Lista completa devuelta por la API
    let indiceActual = 0;         // Índice de la canción en reproducción
    let isDragging = false;
    let newTime = 0;        

    const audioPlayer = document.getElementById('audioPlayer');
    const progressBar = document.querySelector('.progress');
    const progressBarContainer = document.querySelector('.progress-bar');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playBtn = document.getElementById('playBtn');
    const currentSongTitle = document.getElementById('currentSongTitle');
    const volumeSlider = document.querySelector('.volume-slider');

    const playIcon = `
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" width="24" height="24" stroke-width="2">
    <path d="M10 18l6 -6l-6 -6v12"></path>
  </svg>
`;

// SVG para el botón de pausa
const pauseIcon = `
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" width="24" height="24" stroke-width="2">
    <path d="M6 5m0 1a1 1 0 0 1 1 -1h2a1 1 0 0 1 1 1v12a1 1 0 0 1 -1 1h-2a1 1 0 0 1 -1 -1z"></path>
    <path d="M14 5m0 1a1 1 0 0 1 1 -1h2a1 1 0 0 1 1 1v12a1 1 0 0 1 -1 1h-2a1 1 0 0 1 -1 -1z"></path>
  </svg>
`;

    // 1. Llamar a la API de FastAPI para obtener la lista de canciones.
    async function obtenerCanciones() {
      try {
        const respuesta = await fetch('http://127.0.0.1:8000/lista_canciones');
        const data = await respuesta.json();
        // data.canciones debe ser un array de strings (por ejemplo: ["song1.webm", "song2.webm", ...])
        canciones = data.canciones || [];

        // Cargar la primera canción si hay al menos una
        if (canciones.length > 0) {
          cargarCancion(indiceActual);
        }

        // Renderizar solo las últimas 3 en la playlist
        renderPlaylist();
      } catch (error) {
        console.error('Error obteniendo canciones:', error);
      }
    }

    // 2. Función para cargar (y reproducir) una canción por índice
    function cargarCancion(index) {
      const cancion = canciones[index];
      if (!cancion) {
          audioPlayer.src = '';
          currentSongTitle.textContent = 'Sin canción';
          document.getElementById('currentArtistName').textContent = 'Artista';
          return;
      }
  
      currentSongTitle.textContent = cancion.nombre.replace(/\.webm$/i, '');
      document.getElementById('currentArtistName').textContent = cancion.artista || 'Desconocido';
  
      const urlCancion = `http://127.0.0.1:8000/canciones/${encodeURIComponent(cancion.nombre)}`;
      audioPlayer.src = urlCancion;
  }
  

    // 3. Renderizar las últimas 3 canciones en la playlist
    function renderPlaylist() {
      const playlistDiv = document.getElementById('playlistContainer');
      playlistDiv.innerHTML = ''; // Limpia el contenido anterior
  
      canciones.forEach((cancion, index) => {
          const songItem = document.createElement('div');
          songItem.classList.add('song-item');
          if (index === indiceActual) songItem.classList.add('active'); // Resaltar la canción activa
  
          const songDetails = document.createElement('div');
          songDetails.classList.add('song-details');
  
          const songTitle = document.createElement('span');
          songTitle.classList.add('song-title');
          songTitle.textContent = cancion.nombre.replace(/\.webm$/i, '');
  
          const songArtist = document.createElement('span');
          songArtist.classList.add('song-artist');
          songArtist.textContent = cancion.artista || 'Desconocido'; // Usar el artista de la API

  
          const songDuration = document.createElement('span');
          songDuration.classList.add('song-duration');
          songDuration.textContent = cancion.duracion || 'Desconocida'; // Mostrar duración real
  
          songDetails.appendChild(songTitle);
          songDetails.appendChild(songArtist);
          songItem.appendChild(songDetails);
          songItem.appendChild(songDuration);
          playlistDiv.appendChild(songItem);
  
          songItem.addEventListener('click', () => {
              indiceActual = index;
              cargarCancion(indiceActual);
              audioPlayer.play();
              playBtn.innerHTML = pauseIcon;
  
              Array.from(playlistDiv.getElementsByClassName('song-item')).forEach(el => {
                  el.classList.remove('active');
              });
              songItem.classList.add('active');
          });
      });
  }
    // 4. Botón Anterior (cíclico)
    prevBtn.addEventListener('click', () => {
      if (canciones.length === 0) return;
      if (indiceActual > 0) {
        indiceActual--;
      } else {
        indiceActual = canciones.length - 1;
      }
      cargarCancion(indiceActual);
      audioPlayer.play();
      playBtn.innerHTML = pauseIcon;
    });

    // 5. Botón Siguiente (cíclico)
    nextBtn.addEventListener('click', () => {
      if (canciones.length === 0) return;
      if (indiceActual < canciones.length - 1) {
        indiceActual++;
      } else {
        indiceActual = 0;
      }
      cargarCancion(indiceActual);
      audioPlayer.play();
      playBtn.innerHTML = pauseIcon;
    });

    // 6. Botón Play / Pause
    playBtn.addEventListener('click', () => {
      if (audioPlayer.paused) {
        audioPlayer.play();
        playBtn.innerHTML = pauseIcon;
      } else {
        audioPlayer.pause();
        playBtn.innerHTML = playIcon;
      }
    });

    // 7. Control de volumen
 // Control de volumen
 window.addEventListener('load', () => {
  const initialVolume = 0.5; // 50% de volumen
  volumeSlider.value = initialVolume; // Configura el valor del slider
  audioPlayer.volume = initialVolume; // Configura el volumen del audio
  const percentage = initialVolume * 100; // Convertir el valor a porcentaje
  volumeSlider.style.setProperty('--value', `${percentage}%`); // Actualizar el CSS dinámicamente
});


volumeSlider.addEventListener('input', (e) => {
  const value = parseFloat(e.target.value); // Obtener el valor del slider como un número
  audioPlayer.volume = value; // Actualizar el volumen del reproductor de audio
  const percentage = value * 100; // Convertir el valor a porcentaje
  volumeSlider.style.setProperty('--value', `${percentage}%`); // Actualizar el CSS dinámicamente
});


    // 8. Actualizar tiempos de reproducción
    audioPlayer.addEventListener('timeupdate', () => {
            const currentTimeElem = document.getElementById('currentTime');
            const durationElem = document.getElementById('duration');
            const progress = document.querySelector('.progress');

            const formatTime = (time) => {
                if (isNaN(time) || !isFinite(time)) return '0:00';
                const minutes = Math.floor(time / 60);
                const seconds = Math.floor(time % 60);
                return `${minutes}:${seconds.toString().padStart(2, '0')}`;
            };

            // Actualizar tiempos
            currentTimeElem.textContent = formatTime(audioPlayer.currentTime);
            durationElem.textContent = formatTime(audioPlayer.duration);

            // Actualizar barra de progreso
            const progressPercent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progress.style.width = `${progressPercent}%`;
        });

        // 9. Avanzar a la siguiente canción cuando la actual termine
audioPlayer.addEventListener('ended', () => {
  if (indiceActual < canciones.length - 1) {
      indiceActual++; // Avanza al siguiente índice si no es la última canción
  } else {
      indiceActual = 0; // Vuelve a la primera canción si es la última
  }
  cargarCancion(indiceActual); // Cargar la siguiente canción
  audioPlayer.play(); // Reproducir automáticamente
  playBtn.innerHTML = pauseIcon; // Actualizar el botón a "pausa"
});

        // Manejador para iniciar el arrastre
progressBarContainer.addEventListener('mousedown', (event) => {
  isDragging = true;
  updateVisualProgress(event); // Actualiza visualmente la barra durante el arrastre
});

// Manejador para actualizar el progreso visual mientras se arrastra
document.addEventListener('mousemove', (event) => {
  if (isDragging) {
    updateVisualProgress(event);
  }
});

// Manejador para finalizar el arrastre y aplicar el cambio de tiempo al audio
document.addEventListener('mouseup', () => {
  if (isDragging) {
    isDragging = false;
    audioPlayer.currentTime = newTime; // Aplicar el tiempo calculado al soltar el ratón
  }
});

// Función para calcular y actualizar el progreso visualmente
function updateVisualProgress(event) {
  const rect = progressBarContainer.getBoundingClientRect(); // Dimensiones de la barra
  const offsetX = event.clientX - rect.left; // Posición horizontal del cursor dentro de la barra
  const width = rect.width; // Ancho total de la barra
  const progressPercent = Math.min(Math.max(offsetX / width, 0), 1); // Normalizar entre 0 y 1
  progressBar.style.width = `${progressPercent * 100}%`; // Actualiza la barra visualmente
  newTime = progressPercent * audioPlayer.duration; // Calcula el nuevo tiempo, pero no lo aplica todavía
}

    // 10. Iniciar la aplicación
    obtenerCanciones();
  </script>
</body>
</html>
